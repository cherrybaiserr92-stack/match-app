<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>СДВИГ: Трибунал</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <style>
        :root {
            --bg-base: #070908;
            --surface: #121A14;
            --neon-amber: #F59E0B;
            --neon-green: #10B981;
            --neon-red: #EF4444;
            --text-main: #E2E8F0;
            --text-dim: #64748B;
            --border: rgba(245, 158, 11, 0.15);
        }

        body {
            margin: 0; padding: 0; 
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
            -webkit-user-select: none; user-select: none;
        }

        /* Эффект старого монитора поверх всего экрана */
        body::after {
            content: " "; display: block; position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 999; background-size: 100% 4px, 6px 100%;
            pointer-events: none; opacity: 0.4;
        }

        .header {
            width: 100%; height: 70px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px; box-sizing: border-box;
            border-bottom: 1px solid var(--border);
            background: rgba(7, 9, 8, 0.8); backdrop-filter: blur(10px); z-index: 50;
        }
        
        .logo { font-family: 'JetBrains Mono', monospace; font-size: 20px; color: var(--neon-amber); text-shadow: 0 0 10px rgba(245,158,11,0.5); }
        .live-indicator { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; color: var(--neon-green); }
        .dot { width: 8px; height: 8px; background: var(--neon-green); border-radius: 50%; box-shadow: 0 0 8px var(--neon-green); animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .container { width: 100%; max-width: 400px; height: calc(100vh - 70px); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        .card {
            width: 90%; height: 65%;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; box-shadow: 0 25px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(245,158,11,0.05);
            position: absolute; display: flex; flex-direction: column;
            transition: transform 0.4s ease, opacity 0.4s ease;
            overflow: hidden;
        }

        /* Бегущая строка типа дела */
        .card-type-banner {
            width: 100%; background: rgba(245, 158, 11, 0.1); color: var(--neon-amber);
            font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase;
            padding: 8px 0; text-align: center; border-bottom: 1px solid var(--border);
            letter-spacing: 2px;
        }

        .card-content { padding: 30px 25px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        
        /* Имитация аудиоволны */
        .audio-wave { display: flex; align-items: center; justify-content: center; gap: 4px; margin-bottom: 30px; height: 40px; }
        .wave-bar { width: 4px; background: var(--neon-amber); border-radius: 2px; animation: wave 1s infinite ease-in-out alternate; }
        .wave-bar:nth-child(1) { height: 10px; animation-delay: 0.1s; } .wave-bar:nth-child(2) { height: 25px; animation-delay: 0.2s; }
        .wave-bar:nth-child(3) { height: 40px; animation-delay: 0.3s; } .wave-bar:nth-child(4) { height: 20px; animation-delay: 0.4s; }
        .wave-bar:nth-child(5) { height: 15px; animation-delay: 0.5s; }
        
        @keyframes wave { 0% { transform: scaleY(0.3); opacity: 0.5; } 100% { transform: scaleY(1); opacity: 1; } }

        .card-text { font-size: 18px; line-height: 1.6; font-weight: 600; text-align: center; }

        /* Экран результатов (Скрыт до свайпа) */
        .results-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18, 26, 20, 0.95); backdrop-filter: blur(5px);
            display: none; flex-direction: column; padding: 30px; box-sizing: border-box;
            justify-content: center;
        }
        
        .result-title { font-family: 'JetBrains Mono', monospace; color: var(--neon-amber); font-size: 14px; margin-bottom: 30px; text-align: center; }
        
        .bar-container { margin-bottom: 25px; }
        .bar-label { display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
        .bar-track { width: 100%; height: 12px; background: rgba(0,0,0,0.5); border-radius: 6px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        
        .bar-fill-left { height: 100%; background: var(--neon-red); width: 50%; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .bar-fill-right { height: 100%; background: var(--neon-green); width: 50%; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .percent-text { font-family: 'JetBrains Mono', monospace; font-size: 18px; }
        .total-votes { text-align: center; color: var(--text-dim); font-size: 12px; margin-top: 10px; font-family: 'JetBrains Mono', monospace; }

        .next-btn {
            background: transparent; border: 1px solid var(--neon-amber); color: var(--neon-amber);
            padding: 15px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 14px;
            margin-top: 30px; cursor: pointer; text-transform: uppercase;
        }
        .next-btn:active { background: rgba(245, 158, 11, 0.2); }

        /* Кнопки управления */
        .controls { width: 90%; display: flex; justify-content: space-between; position: absolute; bottom: 5%; z-index: 10; }
        .action-btn {
            width: 45%; padding: 18px 0; border-radius: 12px; font-weight: 800; font-size: 16px;
            text-transform: uppercase; border: none; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: transform 0.1s;
        }
        .action-btn:active { transform: scale(0.95); }
        .btn-left { background: #2A1515; color: var(--neon-red); border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-right { background: #13231B; color: var(--neon-green); border: 1px solid rgba(16, 185, 129, 0.3); }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">TRIBUNAL_OS</div>
        <div class="live-indicator"><div class="dot"></div> LIVE_LINK</div>
    </div>

    <div class="container" id="main-container">
        </div>

    <div class="controls" id="controls">
        <button class="action-btn btn-left" id="btn-left" onclick="makeVote('left')">ОСУДИТЬ</button>
        <button class="action-btn btn-right" id="btn-right" onclick="makeVote('right')">ОПРАВДАТЬ</button>
    </div>

<script>
    // Имитация загрузки дел с бэкенда (соответствует TribunalController)
    const cases = [
        { id: "1", type: "CONFESSION", title: "ИСПОВЕДЬ", text: "Я работаю баристой и тайно наливаю обычный кофе клиентам, которые просят декаф и при этом хамят мне." },
        { id: "2", type: "RED_FLAG", title: "КРАСНЫЙ ФЛАГ", text: "На первом свидании парень попросил разделить счет пополам, хотя сам позвал меня в дорогой ресторан. Это красный флаг?" },
        { id: "3", type: "HOT_TAKE", title: "БАЗА ИЛИ БРЕД", text: "Люди, которые отправляют голосовые сообщения длиннее минуты, не уважают чужое время. За это нужно блокировать." }
    ];

    let currentIndex = 0;
    let stompClient = null;
    const userId = "U_" + Math.floor(Math.random() * 9999);
    
    // Настройка названий кнопок в зависимости от типа дела
    const buttonLabels = {
        "CONFESSION": { left: "ОСУДИТЬ", right: "ОПРАВДАТЬ" },
        "RED_FLAG": { left: "БЕГИ", right: "НОРМА" },
        "HOT_TAKE": { left: "БРЕД", right: "БАЗА" }
    };

    function connect() {
        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);
        stompClient.debug = null; 
        
        stompClient.connect({}, function (frame) {
            document.querySelector('.live-indicator').innerHTML = '<div class="dot"></div> ONLINE';
            
            // Подписываемся на живые результаты
            stompClient.subscribe('/topic/live-results', function (message) {
                const result = JSON.parse(message.body);
                updateLiveCharts(result);
            });
        });
    }

    function renderCard() {
        const container = document.getElementById('main-container');
        document.getElementById('controls').style.display = 'flex'; // Показываем кнопки

        if (currentIndex >= cases.length) {
            container.innerHTML = `<div style="color:var(--neon-amber); text-align:center; font-family:'JetBrains Mono';">
                <span style="font-size:40px;">⚠️</span><br><br>НЕТ ДОСТУПНЫХ ДЕЛ<br>ОЖИДАНИЕ НОВЫХ ПОСТУПЛЕНИЙ...</div>`;
            document.getElementById('controls').style.display = 'none';
            return;
        }
        
        const item = cases[currentIndex];
        
        // Обновляем текст на кнопках
        document.getElementById('btn-left').innerText = buttonLabels[item.type].left;
        document.getElementById('btn-right').innerText = buttonLabels[item.type].right;

        container.innerHTML = `
            <div class="card" id="current-card">
                <div class="card-type-banner">[ ${item.title} ]</div>
                <div class="card-content">
                    <div class="audio-wave">
                        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
                        <div class="wave-bar"></div><div class="wave-bar"></div>
                    </div>
                    <div class="card-text">"${item.text}"</div>
                </div>
                
                <div class="results-overlay" id="results-overlay">
                    <div class="result-title">ВЕРДИКТ ТРИБУНАЛА</div>
                    
                    <div class="bar-container">
                        <div class="bar-label">
                            <span style="color: var(--neon-red)">${buttonLabels[item.type].left}</span>
                            <span class="percent-text" style="color: var(--neon-red)" id="lbl-left">50%</span>
                        </div>
                        <div class="bar-track"><div class="bar-fill-left" id="bar-left"></div></div>
                    </div>
                    
                    <div class="bar-container">
                        <div class="bar-label">
                            <span style="color: var(--neon-green)">${buttonLabels[item.type].right}</span>
                            <span class="percent-text" style="color: var(--neon-green)" id="lbl-right">50%</span>
                        </div>
                        <div class="bar-track"><div class="bar-fill-right" id="bar-right"></div></div>
                    </div>
                    
                    <div class="total-votes">ВСЕГО ГОЛОСОВ: <span id="total-votes-count">0</span></div>
                    
                    <button class="next-btn" onclick="nextCase()">СЛЕДУЮЩЕЕ ДЕЛО >></button>
                </div>
            </div>
        `;
    }

    function makeVote(direction) {
        const item = cases[currentIndex];
        const card = document.getElementById('current-card');
        const overlay = document.getElementById('results-overlay');
        
        // Скрываем кнопки свайпа
        document.getElementById('controls').style.display = 'none';
        
        // Отправляем голос на сервер
        if (stompClient && stompClient.connected) {
            stompClient.send("/app/vote", {}, JSON.stringify({
                caseId: item.id, userId: userId, direction: direction
            }));
        }

        // Анимация в стиле глитча/перехода
        card.style.transform = direction === 'left' ? 'scale(0.95) rotate(-2deg)' : 'scale(0.95) rotate(2deg)';
        card.style.borderColor = direction === 'left' ? 'var(--neon-red)' : 'var(--neon-green)';
        
        setTimeout(() => {
            card.style.transform = 'scale(1) rotate(0deg)';
            card.style.borderColor = 'var(--border)';
            overlay.style.display = 'flex'; // Открываем экран результатов
        }, 300);
    }

    function updateLiveCharts(result) {
        // Если прилетел апдейт для текущего дела, и мы сейчас смотрим на результаты
        if (cases[currentIndex] && result.caseId === cases[currentIndex].id) {
            document.getElementById('bar-left').style.width = result.leftPercent + '%';
            document.getElementById('lbl-left').innerText = result.leftPercent + '%';
            
            document.getElementById('bar-right').style.width = result.rightPercent + '%';
            document.getElementById('lbl-right').innerText = result.rightPercent + '%';
            
            document.getElementById('total-votes-count').innerText = result.totalVotes;
        }
    }

    function nextCase() {
        const card = document.getElementById('current-card');
        card.style.transform = 'translateY(-150%)'; // Улетает вверх
        card.style.opacity = '0';
        
        setTimeout(() => {
            currentIndex++;
            renderCard();
        }, 300);
    }

    renderCard();
    connect();
</script>
</body>
</html>
