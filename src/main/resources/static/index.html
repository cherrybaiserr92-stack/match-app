<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СДВИГ</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; text-align: center; }
        .hidden { display: none !important; }
        .screen { padding: 20px; }
        .btn { padding: 10px 20px; margin: 10px; cursor: pointer; border-radius: 5px; border: none; }
        .auth-buttons { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 30px;}
        .disabled-btn { background: #555; color: #aaa; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="loading-screen" class="screen">
        <h2>Загрузка...</h2>
    </div>

    <div id="login-screen" class="screen hidden">
        <h1>СДВИГ</h1>
        <p>Войдите, чтобы продолжить игру</p>
        
        <div class="auth-buttons">
            <script async src="https://telegram.org/js/telegram-widget.js?22" 
                    data-telegram-login=sdvig_game_bot" 
                    data-size="large" 
                    data-onauth="onTelegramAuth(user)" 
                    data-request-access="write"></script>
            
            <button class="btn disabled-btn" disabled>Войти через Google (Скоро)</button>
            <button class="btn disabled-btn" disabled>Войти через VK (Скоро)</button>
        </div>
    </div>

    <div id="main-screen" class="screen hidden">
        <h1>Главное меню</h1>
        <p id="user-info"></p>
        <button class="btn" onclick="alert('Открытие трибунала...')">Трибунал</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
