<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>СДВИГ: Трибунал</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <style>
        :root {
            --bg-base: #050706; --surface: #0F1611;
            --neon-amber: #F59E0B; --neon-green: #10B981; --neon-red: #EF4444; --neon-blue: #3B82F6;
            --text-main: #E2E8F0; --text-dim: #475569;
            --border: rgba(245, 158, 11, 0.12);
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-base); color: var(--text-main);
            font-family: 'Inter', sans-serif; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; -webkit-user-select: none; user-select: none;
            touch-action: none; /* Отключаем системные свайпы браузера */
        }

        /* Сканирующие линии ЭЛТ */
        body::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            z-index: 999; background-size: 100% 4px; pointer-events: none; opacity: 0.25;
        }

        .header {
            height: 60px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; border-bottom: 1px solid var(--border);
            background: rgba(5, 7, 6, 0.8); backdrop-filter: blur(12px); z-index: 50;
        }
        .logo { font-family: 'JetBrains Mono', monospace; font-size: 16px; color: var(--neon-amber); letter-spacing: 1px; }
        
        .view-container {
            flex-grow: 1; position: relative; display: none; flex-direction: column; 
            align-items: center; justify-content: center; padding-bottom: 80px; box-sizing: border-box;
        }
        .view-active { display: flex; }

        /* --- СВАЙП КАРТОЧКИ (АРЕНА) --- */
        .card-deck {
            position: relative; width: 90%; height: 70%; max-height: 480px;
            display: flex; align-items: center; justify-content: center;
        }

        .card {
            width: 100%; height: 100%; background: var(--surface); 
            border: 1px solid var(--border); border-radius: 16px; 
            position: absolute; display: flex; flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.9);
            will-change: transform, opacity; /* Оптимизация для плавной мобильной графики */
            overflow: hidden;
        }
        
        /* Состояние перетаскивания (убираем transition чтобы не лагало) */
        .card.dragging { transition: none !important; }

        .card-type-banner { background: rgba(245, 158, 11, 0.05); color: var(--text-dim); font-family: 'JetBrains Mono'; font-size: 10px; text-align: center; padding: 10px 0; border-bottom: 1px solid var(--border); letter-spacing: 3px;}
        .card-content { padding: 35px 25px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; pointer-events: none; }
        .card-text { font-size: 19px; line-height: 1.6; font-weight: 600; text-align: center; letter-spacing: -0.5px; }
        
        /* Маркеры направления прямо на карточке при свайпе */
        .swipe-indicator {
            position: absolute; top: 30px; padding: 8px 16px; font-family: 'JetBrains Mono';
            font-size: 14px; font-weight: bold; border-radius: 6px; opacity: 0; transform: rotate(-10deg);
        }
        .swipe-indicator.left { left: 30px; border: 2px solid var(--neon-red); color: var(--neon-red); }
        .swipe-indicator.right { right: 30px; border: 2px solid var(--neon-green); color: var(--neon-green); transform: rotate(10deg); }

        /* Живые результаты поверх карточки */
        .results-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 16, 12, 0.98); display: none; flex-direction: column; padding: 35px 25px; box-sizing: border-box; justify-content: center; z-index: 10; }
        .bar-container { margin-bottom: 25px; }
        .bar-label { display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; margin-bottom: 8px; font-family: 'JetBrains Mono'; }
        .bar-track { width: 100%; height: 8px; background: rgba(0,0,0,0.6); border-radius: 4px; overflow: hidden; }
        .bar-fill-left { height: 100%; background: var(--neon-red); width: 0%; transition: width 0.6s cubic-bezier(0.1, 0.8, 0.3, 1); }
        .bar-fill-right { height: 100%; background: var(--neon-green); width: 0%; transition: width 0.6s cubic-bezier(0.1, 0.8, 0.3, 1); }
        .next-btn { background: transparent; border: 1px solid var(--neon-amber); color: var(--neon-amber); padding: 15px; border-radius: 8px; font-family: 'JetBrains Mono'; font-size: 13px; width: 100%; cursor: pointer; text-transform: uppercase; margin-top: 15px; letter-spacing: 1px;}

        /* --- БИОМЕТРИЯ В ПРОФИЛЕ --- */
        .scanner-zone {
            width: 120px; height: 120px; border: 1px solid var(--border);
            border-radius: 50%; margin: 30px auto; display: flex; align-items: center;
            justify-content: center; position: relative; cursor: pointer;
            background: rgba(245, 158, 11, 0.02);
        }
        .scanner-line {
            position: absolute; width: 90%; height: 2px; background: var(--neon-amber);
            box-shadow: 0 0 10px var(--neon-amber); top: 0;
            animation: scan 2s infinite ease-in-out; display: none;
        }
        @keyframes scan { 0% { top: 10%; } 50% { top: 90%; } 100% { top: 10%; } }

        /* --- ФОРМА СОЗДАНИЯ --- */
        .form-container { width: 90%; }
        .cyber-select, .cyber-input { width: 100%; background: #0A0F0B; border: 1px solid var(--border); color: var(--text-main); padding: 16px; border-radius: 10px; margin-bottom: 25px; font-family: 'Inter'; font-size: 15px; box-sizing: border-box; }
        .cyber-input { height: 140px; resize: none; }
        .submit-btn { width: 100%; background: transparent; color: var(--neon-green); border: 1px solid var(--neon-green); padding: 16px; border-radius: 10px; font-family: 'JetBrains Mono'; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;}

        /* --- НАВИГАЦИЯ --- */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 65px;
            background: rgba(5, 7, 6, 0.95); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .nav-item { color: #334155; font-family: 'JetBrains Mono'; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; width: 33%; }
        .nav-item svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }
        .nav-item.active { color: var(--neon-amber); }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">TRIBUNAL_OS // v2.0</div>
        <div style="font-family: 'JetBrains Mono'; color: var(--neon-amber); font-size: 11px;" id="sys-status">SYS_CONNECTING</div>
    </div>

    <div class="view-container view-active" id="view-arena">
        <div class="card-deck" id="card-deck">
            <div class="card" id="current-card">
                <div class="swipe-indicator left" id="ind-left">ОСУДИТЬ</div>
                <div class="swipe-indicator right" id="ind-right">ОПРАВДАТЬ</div>
                
                <div class="card-type-banner" id="card-banner">[ ЗАГРУЗКА ]</div>
                <div class="card-content">
                    <div class="card-text" id="card-text">Подключение к узлу сети...</div>
                </div>
                
                <div class="results-overlay" id="results-overlay">
                    <div style="text-align:center; color:var(--neon-amber); font-family:'JetBrains Mono'; font-size:12px; margin-bottom:25px; letter-spacing:2px;">РАСПРЕДЕЛЕНИЕ ГОЛОСОВ</div>
                    <div class="bar-container">
                        <div class="bar-label"><span id="lbl-res-left" style="color:var(--neon-red)">-</span><span id="lbl-left">0%</span></div>
                        <div class="bar-track"><div class="bar-fill-left" id="bar-left"></div></div>
                    </div>
                    <div class="bar-container">
                        <div class="bar-label"><span id="lbl-res-right" style="color:var(--neon-green)">-</span><span id="lbl-right">0%</span></div>
                        <div class="bar-track"><div class="bar-fill-right" id="bar-right"></div></div>
                    </div>
                    <button class="next-btn" onclick="nextCase()">СЛЕДУЮЩЕЕ ДЕЛО</button>
                </div>
            </div>
        </div>
    </div>

    <div class="view-container" id="view-create">
        <div class="form-container">
            <select class="cyber-select" id="new-case-type" onchange="triggerSound('click')">
                <option value="CONFESSION">ИСПОВЕДЬ (Мой грех)</option>
                <option value="RED_FLAG">КРАСНЫЙ ФЛАГ (Оценка ситуации)</option>
                <option value="HOT_TAKE">БАЗА / БРЕД (Мнение)</option>
            </select>
            <textarea class="cyber-input" id="new-case-text" placeholder="Опишите ситуацию анонимно..."></textarea>
            <button class="submit-btn" onclick="submitCase()">ПЕРЕДАТЬ В ТРИБУНАЛ</button>
        </div>
    </div>

    <div class="view-container" id="view-profile">
        <div style="text-align: center; width: 100%;">
            <div class="scanner-zone" id="scanner" onmousedown="startScan()" onmouseup="stopScan()" ontouchstart="startScan()" ontouchend="stopScan()">
                <div class="scanner-line" id="scan-line"></div>
                <span id="scan-finger" style="font-size:36px; filter: grayscale(1) sepia(1) saturate(5);">🖕</span>
            </div>
            <div style="font-family:'JetBrains Mono'; color:var(--neon-amber); font-size:13px; margin-top:-10px;" id="scan-status">ТРЕБУЕТСЯ ИДЕНТИФИКАЦИЯ</div>
            
            <div style="margin-top: 30px; font-size: 22px; font-weight: bold;" id="prof-name">USER_ANONYMOUS</div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('arena', this)">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 22l10-4 10 4L12 2z"/></svg>АРЕНА
        </div>
        <div class="nav-item" onclick="switchTab('create', this)">
            <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>ДОНЕСТИ
        </div>
        <div class="nav-item" onclick="switchTab('profile', this)">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/></svg>ПРОФИЛЬ
        </div>
    </div>

<script>
    let cases = [
        { id: "1", type: "CONFESSION", title: "ИСПОВЕДЬ", text: "Я работаю баристой и тайно наливаю обычный кофе клиентам, которые просят декаф и при этом хамят мне." },
        { id: "2", type: "RED_FLAG", title: "КРАСНЫЙ ФЛАГ", text: "На первом свидании парень попросил разделить счет пополам, хотя сам позвал меня в дорогой ресторан. Это красный флаг?" },
        { id: "3", type: "HOT_TAKE", title: "БАЗА ИЛИ БРЕД", text: "Люди, которые отправляют голосовые сообщения длиннее минуты, не уважают чужое время." }
    ];
    let currentIndex = 0;
    let stompClient = null;

    const labels = {
        "CONFESSION": { l: "ОСУДИТЬ", r: "ОПРАВДАТЬ" },
        "RED_FLAG": { l: "БЕГИ", r: "НОРМА" },
        "HOT_TAKE": { l: "БРЕД", r: "БАЗА" }
    };

    // --- СИНТЕЗАТОР ЗВУКОВ (Web Audio API) ---
    let audioCtx = null;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    
    function triggerSound(type) {
        initAudio();
        if(!audioCtx) return;
        
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);

        if (type === 'click') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
            osc.start(); osc.stop(audioCtx.currentTime + 0.04);
        } else if (type === 'zap') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        }
    }

    function triggerHaptic() {
        if (navigator.vibrate) navigator.vibrate(30);
    }

    // --- ПОДКЛЮЧЕНИЕ WEBSOCKET ---
    function connect() {
        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;
        stompClient.connect({}, function () {
            document.getElementById('sys-status').innerText = 'SYS_ONLINE';
            stompClient.subscribe('/topic/live-results', (msg) => updateCharts(JSON.parse(msg.body)));
            stompClient.subscribe('/topic/new-cases', (msg) => {
                const c = JSON.parse(msg.body);
                const titles = {"CONFESSION": "ИСПОВЕДЬ", "RED_FLAG": "КРАСНЫЙ ФЛАГ", "HOT_TAKE": "БАЗА ИЛИ БРЕД"};
                c.title = titles[c.type]; cases.push(c);
                if(currentIndex >= cases.length - 1) renderCard();
            });
        });
    }

    function switchTab(tab, el) {
        triggerSound('click'); triggerHaptic();
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelectorAll('.view-container').forEach(v => v.classList.remove('view-active'));
        el.classList.add('active');
        document.getElementById('view-' + tab).classList.add('view-active');
    }

    function renderCard() {
        const card = document.getElementById('current-card');
        document.getElementById('results-overlay').style.display = 'none';
        
        // Сброс стилей после свайпа
        card.style.transform = 'translate(0px, 0px) rotate(0deg)';
        card.style.opacity = '1';
        card.style.borderColor = 'var(--border)';
        document.getElementById('ind-left').style.opacity = 0;
        document.getElementById('ind-right').style.opacity = 0;

        if (currentIndex >= cases.length) {
            document.getElementById('card-banner').innerText = "[ КОНЕЦ СЕССИИ ]";
            document.getElementById('card-text').innerHTML = "<span style='color:var(--neon-amber)'>ВСЕ ДЕЛА РАССМОТРЕНЫ.<br>ОЖИДАЙТЕ НОВЫХ ПРЕЦЕДЕНТОВ.</span>";
            return;
        }

        const item = cases[currentIndex];
        document.getElementById('card-banner').innerText = `[ ${item.title} ]`;
        document.getElementById('card-text').innerText = `"${item.text}"`;
        
        document.getElementById('ind-left').innerText = labels[item.type].l;
        document.getElementById('ind-right').innerText = labels[item.type].r;
    }

    // --- СВАЙП-ДВИЖОК (TOUCH ENGINE) ---
    const card = document.getElementById('current-card');
    let startX = 0, currentX = 0, distanceX = 0;
    let isDragging = false;

    card.addEventListener('touchstart', (e) => {
        if(document.getElementById('results-overlay').style.display === 'flex') return;
        isDragging = true;
        card.classList.add('dragging');
        startX = e.touches[0].clientX;
        initAudio();
    });

    card.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        currentX = e.touches[0].clientX;
        distanceX = currentX - startX;
        
        // Вычисляем угол наклона карточки при перетаскивании
        let rotation = distanceX / 15;
        card.style.transform = `translate(${distanceX}px, ${Math.abs(distanceX)/6}px) rotate(${rotation}deg)`;
        
        // Индикаторы выбора
        if(distanceX > 40) {
            document.getElementById('ind-right').style.opacity = Math.min(distanceX / 100, 1);
            document.getElementById('ind-left').style.opacity = 0;
            card.style.borderColor = 'var(--neon-green)';
        } else if (distanceX < -40) {
            document.getElementById('ind-left').style.opacity = Math.min(Math.abs(distanceX) / 100, 1);
            document.getElementById('ind-right').style.opacity = 0;
            card.style.borderColor = 'var(--neon-red)';
        } else {
            document.getElementById('ind-left').style.opacity = 0;
            document.getElementById('ind-right').style.opacity = 0;
            card.style.borderColor = 'var(--border)';
        }
    });

    card.addEventListener('touchend', () => {
        if (!isDragging) return;
        isDragging = false;
        card.classList.remove('dragging');
        
        const threshold = window.innerWidth * 0.35; // Порог свайпа - 35% экрана
        
        if (distanceX > threshold) {
            executeVote('right');
        } else if (distanceX < -threshold) {
            executeVote('left');
        } else {
            // Возврат карточки на место, если свайп слабый
            card.style.transition = 'transform 0.3s ease, border-color 0.3s';
            card.style.transform = 'translate(0px, 0px) rotate(0deg)';
            card.style.borderColor = 'var(--border)';
            document.getElementById('ind-left').style.opacity = 0;
            document.getElementById('ind-right').style.opacity = 0;
            setTimeout(() => card.style.transition = '', 300);
        }
        distanceX = 0;
    });

    function executeVote(dir) {
        triggerSound('zap'); triggerHaptic();
        const item = cases[currentIndex];
        
        document.getElementById('lbl-res-left').innerText = labels[item.type].l;
        document.getElementById('lbl-res-right').innerText = labels[item.type].r;

        // Эвакуация карточки со сцены в бок
        card.style.transition = 'transform 0.2s ease, opacity 0.2s';
        card.style.transform = `translate(${dir === 'right' ? 150 : -150}%, 20px) rotate(${dir === 'right' ? 25 : -25}deg)`;
        card.style.opacity = '0';

        if (stompClient) stompClient.send("/app/vote", {}, JSON.stringify({ caseId: item.id, direction: dir }));
        
        // Плавный возврат в центр, но уже с открытым экраном результатов
        setTimeout(() => {
            card.style.transition = '';
            card.style.transform = 'translate(0px, 0px) rotate(0deg)';
            card.style.opacity = '1';
            document.getElementById('results-overlay').style.display = 'flex';
        }, 250);
    }

    function updateCharts(res) {
        if (cases[currentIndex] && res.caseId === cases[currentIndex].id) {
            document.getElementById('bar-left').style.width = res.leftPercent + '%';
            document.getElementById('lbl-left').innerText = res.leftPercent + '%';
            document.getElementById('bar-right').style.width = res.rightPercent + '%';
            document.getElementById('lbl-right').innerText = res.rightPercent + '%';
        }
    }

    function nextCase() {
        triggerSound('click'); triggerHaptic();
        currentIndex++;
        renderCard();
    }

    function submitCase() {
        const type = document.getElementById('new-case-type').value;
        const text = document.getElementById('new-case-text').value;
        if(text.length < 5) return;
        if (stompClient) {
            stompClient.send("/app/create", {}, JSON.stringify({ type: type, content: text }));
            document.getElementById('new-case-text').value = '';
            triggerSound('zap');
            switchTab('arena', document.querySelector('.nav-item'));
        }
    }

    // --- ИНТЕРАКТИВНАЯ БИОМЕТРИЯ ---
    let scanTimeout;
    function startScan() {
        initAudio(); triggerHaptic();
        document.getElementById('scan-line').style.display = 'block';
        document.getElementById('scan-status').innerText = 'СКАНИРОВАНИЕ...';
        document.getElementById('scan-status').style.color = 'var(--neon-amber)';
        
        scanTimeout = setTimeout(() => {
            triggerSound('zap'); triggerHaptic();
            document.getElementById('scan-line').style.display = 'none';
            document.getElementById('scan-status').innerText = 'ЛИЧНОСТЬ ПОДТВЕРЖДЕНА';
            document.getElementById('scan-status').style.color = 'var(--neon-green)';
            document.getElementById('prof-name').innerText = 'ВЕРХОВНЫЙ_СУДЬЯ_77';
            document.getElementById('scan-finger').innerText = '👁️';
        }, 1500);
    }
    function stopScan() {
        clearTimeout(scanTimeout);
        if(document.getElementById('scan-status').innerText === 'СКАНИРОВАНИЕ...') {
            document.getElementById('scan-line').style.display = 'none';
            document.getElementById('scan-status').innerText = 'СКАНИРОВАНИЕ ПРЕРВАНО';
            document.getElementById('scan-status').style.color = 'var(--neon-red)';
        }
    }

    renderCard();
    connect();
</script>
</body>
</html>
