<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Match App: Global Shift</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <style>
        :root {
            /* Уютный ретро-футуризм: Лесной + Янтарный */
            --bg-color: #0c120c; 
            --card-bg: rgba(20, 30, 20, 0.5);
            --border-color: rgba(245, 158, 11, 0.2); 
            --accent-color: #F59E0B; /* Янтарный неон */
            --danger-color: #EF4444;
            --success-color: #10B981;
            --text-main: #FDF6E3; 
            --text-muted: #8E9F85;
        }

        body {
            margin: 0; padding: 0; 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at 50% 0%, rgba(245, 158, 11, 0.05) 0%, transparent 70%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
            -webkit-user-select: none; user-select: none;
        }

        /* Шапка */
        .header {
            position: fixed; top: 0; width: 100%; height: 60px;
            background: rgba(12, 18, 12, 0.7);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; box-sizing: border-box; z-index: 50;
        }
        .header-logo { font-size: 18px; font-weight: 700; color: var(--accent-color); letter-spacing: 1px; text-transform: uppercase; }
        .room-badge { background: rgba(245, 158, 11, 0.1); color: var(--accent-color); padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 600; border: 1px solid rgba(245, 158, 11, 0.3); }

        .screen-content {
            width: 100%; max-width: 450px; height: calc(100vh - 140px);
            margin-top: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Карточки */
        .card-container { position: relative; width: 90%; height: 75%; perspective: 1000px; }
        .card {
            position: absolute; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(245, 158, 11, 0.2);
            display: flex; flex-direction: column; justify-content: flex-end;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            overflow: hidden;
        }
        .card-info {
            background: linear-gradient(to top, rgba(12, 18, 12, 0.95) 0%, rgba(12, 18, 12, 0.6) 50%, transparent 100%);
            padding: 30px 20px 25px; box-sizing: border-box;
        }
        .card-title { font-size: 26px; font-weight: 700; margin: 0 0 8px 0; color: var(--text-main); text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .card-desc { font-size: 14px; color: var(--text-muted); margin: 0; line-height: 1.5; }

        /* Элемент голосового аргумента на карточке */
        .voice-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(245, 158, 11, 0.2); border: 1px solid var(--accent-color);
            color: var(--accent-color); padding: 4px 10px; border-radius: 20px;
            font-size: 12px; font-weight: 600; margin-bottom: 10px;
        }

        /* Кнопки управления */
        .buttons { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 25px; z-index: 10; }
        .btn {
            border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s ease; position: relative;
            background: rgba(20, 30, 20, 0.8); border: 1px solid var(--border-color);
            backdrop-filter: blur(8px);
        }
        .btn:active { transform: scale(0.9); }
        .btn-side { width: 60px; height: 60px; font-size: 20px; }
        .btn-center { width: 75px; height: 75px; font-size: 28px; background: rgba(245, 158, 11, 0.1); border-color: var(--accent-color); color: var(--accent-color); box-shadow: 0 0 15px rgba(245, 158, 11, 0.2); }
        
        .btn-nope { color: var(--danger-color); }
        .btn-like { color: var(--success-color); }

        /* Статус подключения (индикатор сверху) */
        #connection-status { position: fixed; top: 65px; font-size: 10px; color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-logo">СДВИГ</div>
        <div class="room-badge" id="room-id-display">Бункер #42</div>
    </div>
    
    <div id="connection-status">Подключение к серверу...</div>

    <div class="screen-content">
        <div class="card-container" id="card-container"></div>

        <div class="buttons">
            <button class="btn btn-side btn-nope" onclick="sendSwipe('left')">✕</button>
            <button class="btn btn-center" id="voice-btn" onmousedown="startVoice()" onmouseup="stopVoice()" ontouchstart="startVoice()" ontouchend="stopVoice()">🎤</button>
            <button class="btn btn-side btn-like" onclick="sendSwipe('right')">✦</button>
        </div>
    </div>

<script>
    const items = [
        { id: 1, title: "Убежище 11", desc: "Консервированные бобы и сушеное мясо. Идеально для выживания.", img: "https://images.unsplash.com/photo-1584345229649-62e542cc4e96?auto=format&fit=crop&w=600&q=80", hasVoice: true, voiceText: "Я больше не могу есть лапшу, давай мясо!" },
        { id: 2, title: "Точка сбора", desc: "Острые крылышки барбекю с костра.", img: "https://images.unsplash.com/photo-1529193591184-b1d58069ecdd?auto=format&fit=crop&w=600&q=80", hasVoice: false },
        { id: 3, title: "Пайки Синдиката", desc: "Суши, спасенные из криокамеры.", img: "https://images.unsplash.com/photo-1579871494447-9811cf80d66c?auto=format&fit=crop&w=600&q=80", hasVoice: false }
    ];

    let currentIndex = 0;
    const container = document.getElementById('card-container');
    
    // WebSockets логика
    let stompClient = null;
    const userId = "User_" + Math.floor(Math.random() * 1000); // Случайный ID для теста
    const roomId = "42"; 

    function connect() {
        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);
        stompClient.debug = null; // Отключаем лишний спам в консоль
        
        stompClient.connect({}, function (frame) {
            document.getElementById('connection-status').innerText = 'Связь установлена (ID: ' + userId + ')';
            document.getElementById('connection-status').style.color = 'var(--success-color)';
            
            // Подписываемся на события комнаты
            stompClient.subscribe('/topic/room', function (message) {
                const data = JSON.parse(message.body);
                console.log("Входящий сигнал:", data);
                // Если кто-то другой свайпнул
                if(data.userId !== userId) {
                    // Покажем уведомление (позже заменим на сложную логику)
                    let status = document.getElementById('connection-status');
                    status.innerText = 'Партнер ' + (data.direction === 'right' ? 'лайкнул' : 'скипнул') + ' карточку ' + data.itemId;
                    status.style.color = 'var(--accent-color)';
                }
            });
        }, function(error) {
            document.getElementById('connection-status').innerText = 'Ошибка связи. Реконнект...';
            document.getElementById('connection-status').style.color = 'var(--danger-color)';
            setTimeout(connect, 5000);
        });
    }

    function renderCard() {
        if (currentIndex >= items.length) {
            container.innerHTML = `<div style='text-align:center; color:var(--accent-color); font-size:15px; margin-top:50%;'>
                <span style='font-size:40px;'>⚠️</span><br><br>Инициация Глобального Сдвига...<br>Ожидание решения системы.</div>`;
            return;
        }
        
        const item = items[currentIndex];
        const card = document.createElement('div');
        card.className = 'card';
        card.id = 'current-card';
        card.style.backgroundImage = `url('${item.img}')`;
        
        let voiceHtml = item.hasVoice ? `<div class="voice-badge">▶ Аудио: "${item.voiceText}"</div>` : '';
        
        card.innerHTML = `
            <div class="card-info">
                ${voiceHtml}
                <h2 class="card-title">${item.title}</h2>
                <p class="card-desc">${item.desc}</p>
            </div>
        `;
        container.innerHTML = '';
        container.appendChild(card);
    }

    function sendSwipe(direction) {
        const card = document.getElementById('current-card');
        if (!card) return;

        // Анимация
        card.style.transform = direction === 'right' ? 'translateX(150%) rotate(15deg)' : 'translateX(-150%) rotate(-15deg)';
        card.style.opacity = '0';

        // Отправка по WebSockets
        if (stompClient && stompClient.connected) {
            const payload = {
                roomId: roomId,
                userId: userId,
                itemId: items[currentIndex].id,
                direction: direction
            };
            stompClient.send("/app/swipe", {}, JSON.stringify(payload));
        }

        setTimeout(() => {
            currentIndex++;
            renderCard();
        }, 300);
    }

    // Имитация записи голоса
    const voiceBtn = document.getElementById('voice-btn');
    function startVoice() { voiceBtn.style.transform = 'scale(1.2)'; voiceBtn.style.background = 'var(--accent-color)'; voiceBtn.style.color = 'var(--bg-color)'; }
    function stopVoice() { voiceBtn.style.transform = 'scale(1)'; voiceBtn.style.background = 'rgba(245, 158, 11, 0.1)'; voiceBtn.style.color = 'var(--accent-color)'; }

    // Инициализация
    renderCard();
    connect();
</script>
</body>
</html>
