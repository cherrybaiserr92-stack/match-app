<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сдвиг</title>
    
    <!-- Используем системные шрифты Apple/Android для максимальной нативности и чистоты -->
    <style>
        :root {
            --bg-main: #111111;
            --bg-surface: #1C1C1E;
            --bg-elevated: #2C2C2E;
            --accent-blue: #0A84FF;
            --accent-green: #30D158;
            --accent-red: #FF453A;
            --text-primary: #FFFFFF;
            --text-secondary: #8E8E93;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; background-color: var(--bg-main); color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            -webkit-user-select: none; user-select: none; touch-action: none;
        }

        /* --- Header --- */
        .header {
            height: 60px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; background: rgba(17, 17, 17, 0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color); z-index: 50;
        }
        .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(90deg, #FFFFFF, #8E8E93); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-dot { width: 8px; height: 8px; background: var(--accent-green); border-radius: 50%; box-shadow: 0 0 10px var(--accent-green); }

        /* --- Контейнеры экранов --- */
        .view-container {
            flex-grow: 1; position: relative; display: none; flex-direction: column; 
            padding-bottom: 80px; overflow-y: auto; overflow-x: hidden;
        }
        .view-active { display: flex; }

        /* --- ЭКРАН 1: АРЕНА (Карточки) --- */
        #view-arena { justify-content: center; align-items: center; }
        .card-deck { position: relative; width: 90%; height: 75%; max-height: 550px; display: flex; align-items: center; justify-content: center; }
        
        .card {
            width: 100%; height: 100%; background: var(--bg-surface);
            border-radius: 28px; position: absolute; display: flex; flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid var(--border-color);
            will-change: transform, opacity; overflow: hidden;
        }
        .card.dragging { transition: none !important; }

        .card-type-banner {
            padding: 16px; text-align: center; font-size: 13px; font-weight: 600;
            color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
        }
        .card-content { padding: 30px 24px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; pointer-events: none; }
        .card-text { font-size: 22px; line-height: 1.4; font-weight: 500; text-align: center; }

        /* Маркеры свайпа (как печати) */
        .swipe-indicator {
            position: absolute; top: 40px; padding: 8px 16px; font-size: 24px; font-weight: 800;
            border-radius: 8px; opacity: 0; text-transform: uppercase; letter-spacing: 1px; z-index: 10;
        }
        .swipe-indicator.left { right: 30px; border: 4px solid var(--accent-red); color: var(--accent-red); transform: rotate(15deg); }
        .swipe-indicator.right { left: 30px; border: 4px solid var(--accent-green); color: var(--accent-green); transform: rotate(-15deg); }

        /* Результаты голосования */
        .results-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(28, 28, 30, 0.95); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: none; flex-direction: column; padding: 40px 24px; justify-content: center; z-index: 20;
        }
        .result-header { text-align: center; font-size: 16px; font-weight: 600; margin-bottom: 30px; color: var(--text-secondary); }
        .bar-container { margin-bottom: 24px; }
        .bar-label { display: flex; justify-content: space-between; font-size: 15px; font-weight: 600; margin-bottom: 10px; }
        .bar-track { width: 100%; height: 12px; background: var(--bg-elevated); border-radius: 6px; overflow: hidden; }
        .bar-fill-left { height: 100%; background: var(--accent-red); width: 0%; transition: width 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); border-radius: 6px;}
        .bar-fill-right { height: 100%; background: var(--accent-green); width: 0%; transition: width 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); border-radius: 6px;}
        
        .action-btn { background: var(--bg-elevated); color: var(--text-primary); border: none; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 600; width: 100%; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        .action-btn.primary { background: var(--accent-blue); color: white; margin-top: 30px; }
        .action-btn:active { opacity: 0.8; transform: scale(0.98); }

        /* --- ЭКРАН 2: СОЗДАНИЕ ДЕЛА --- */
        .form-container { padding: 30px 24px; }
        .form-title { font-size: 28px; font-weight: 700; margin-bottom: 30px; }
        .modern-select, .modern-input {
            width: 100%; background: var(--bg-surface); border: 1px solid var(--border-color);
            color: var(--text-primary); padding: 18px; border-radius: 16px; margin-bottom: 24px;
            font-size: 16px; font-family: inherit; appearance: none;
        }
        .modern-input { height: 180px; resize: none; line-height: 1.5; }
        .modern-select:focus, .modern-input:focus { outline: none; border-color: var(--accent-blue); }

        /* --- ЭКРАН 3: ПРОФИЛЬ (ВОССТАНОВЛЕННЫЙ И ОБНОВЛЕННЫЙ) --- */
        .profile-container { padding: 30px 24px; width: 100%; }
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .avatar { width: 80px; height: 80px; border-radius: 40px; background: linear-gradient(135deg, #0A84FF, #30D158); display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 10px 20px rgba(10, 132, 255, 0.2); }
        .profile-info h2 { margin: 0 0 5px 0; font-size: 24px; }
        .profile-info p { margin: 0; color: var(--text-secondary); font-size: 14px; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 40px; }
        .stat-card { background: var(--bg-surface); padding: 16px 10px; border-radius: 16px; text-align: center; border: 1px solid var(--border-color); }
        .stat-value { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .stat-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }

        .auth-section h3 { font-size: 14px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 16px; letter-spacing: 0.5px; }
        .auth-btn { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 16px; border-radius: 16px; border: none; font-size: 16px; font-weight: 600; margin-bottom: 12px; cursor: pointer; color: white; }
        .btn-tg { background: #2AABEE; }
        .btn-google { background: var(--bg-surface); color: var(--text-primary); border: 1px solid var(--border-color); }

        /* --- НИЖНЯЯ НАВИГАЦИЯ --- */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: rgba(28, 28, 30, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color); display: flex; justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom); z-index: 100;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; color: var(--text-secondary); width: 33%; cursor: pointer; transition: color 0.2s; }
        .nav-item svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .nav-item span { font-size: 11px; font-weight: 600; }
        .nav-item.active { color: var(--text-primary); }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Сдвиг</div>
        <div style="display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-secondary);">
            <div class="status-dot" id="sys-status"></div> Онлайн
        </div>
    </div>

    <!-- АРЕНА СО СВАЙПАМИ -->
    <div class="view-container view-active" id="view-arena">
        <div class="card-deck" id="card-deck">
            <div class="card" id="current-card">
                <div class="swipe-indicator left" id="ind-left">ОСУДИТЬ</div>
                <div class="swipe-indicator right" id="ind-right">ОПРАВДАТЬ</div>
                
                <div class="card-type-banner" id="card-banner">Загрузка...</div>
                <div class="card-content"><div class="card-text" id="card-text">Ищем прецеденты в сети...</div></div>
                
                <div class="results-overlay" id="results-overlay">
                    <div class="result-header">Мнение общества</div>
                    
                    <div class="bar-container">
                        <div class="bar-label"><span id="lbl-res-left" style="color:var(--accent-red)">Осудить</span><span id="lbl-left">0%</span></div>
                        <div class="bar-track"><div class="bar-fill-left" id="bar-left"></div></div>
                    </div>
                    
                    <div class="bar-container">
                        <div class="bar-label"><span id="lbl-res-right" style="color:var(--accent-green)">Оправдать</span><span id="lbl-right">0%</span></div>
                        <div class="bar-track"><div class="bar-fill-right" id="bar-right"></div></div>
                    </div>
                    
                    <button class="action-btn" onclick="alert('В разработке: здесь будет ветка комментариев с лучшими аргументами!')">Читать обсуждение</button>
                    <button class="action-btn primary" onclick="nextCase()">Следующий сдвиг</button>
                </div>
            </div>
        </div>
    </div>

    <!-- СОЗДАНИЕ КОНТЕНТА -->
    <div class="view-container" id="view-create">
        <div class="form-container">
            <div class="form-title">Новый прецедент</div>
            <select class="modern-select" id="new-case-type" onchange="triggerSound('soft')">
                <option value="CONFESSION">Исповедь (Оцени мой поступок)</option>
                <option value="RED_FLAG">Красный флаг (Норма или нет?)</option>
                <option value="HOT_TAKE">Спорное мнение (База или Бред)</option>
            </select>
            <textarea class="modern-input" id="new-case-text" placeholder="Опиши ситуацию. Будь честен, мы сохраняем анонимность..."></textarea>
            <button class="action-btn primary" onclick="submitCase()">Опубликовать анонимно</button>
        </div>
    </div>

    <!-- ПРОФИЛЬ -->
    <div class="view-container" id="view-profile">
        <div class="profile-container">
            <div class="profile-header">
                <div class="avatar">🎭</div>
                <div class="profile-info">
                    <h2>Аноним_992</h2>
                    <p>Ранг: Наблюдатель</p>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" style="color: var(--accent-blue)">14</div>
                    <div class="stat-label">Сдвигов</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: var(--accent-green)">92%</div>
                    <div class="stat-label">Солидарность</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: var(--accent-red)">5</div>
                    <div class="stat-label">Бунтарство</div>
                </div>
            </div>

            <div class="auth-section">
                <h3>Сохранить прогресс</h3>
                <button class="auth-btn btn-tg" onclick="alert('API Телеграма будет подключено позже')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.19-.08-.05-.19-.02-.27 0-.11.03-1.9 1.21-5.36 3.55-.5.35-1 .51-1.46.5-.49-.01-1.42-.27-2.11-.5-.83-.27-1.49-.41-1.43-.88.03-.23.36-.47.99-.72 3.86-1.68 6.43-2.79 7.7-3.32 3.66-1.52 4.42-1.78 4.91-1.79.11 0 .35.03.48.14.11.09.14.22.15.34-.01.07-.01.21-.02.26z"/></svg>
                    Войти через Telegram
                </button>
                <button class="auth-btn btn-google" onclick="alert('API Google будет подключено позже')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12.24 10.285V14.4h6.806c-.275 1.765-2.056 5.174-6.806 5.174-4.095 0-7.439-3.389-7.439-7.574s3.345-7.574 7.439-7.574c2.33 0 3.891.989 4.785 1.849l3.254-3.138C18.189 1.186 15.479 0 12.24 0c-6.635 0-12 5.365-12 12s5.365 12 12 12c6.926 0 11.52-4.869 11.52-11.726 0-.788-.085-1.39-.189-1.989H12.24z"/></svg>
                    Войти через Google
                </button>
            </div>
        </div>
    </div>

    <!-- НАВИГАЦИЯ -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('arena', this)">
            <svg viewBox="0 0 24 24"><path d="M21 3H3v18h18V3zM9 17H7v-4h2v4zm4 0h-2v-8h2v8zm4 0h-2V9h2v8z"/></svg>
            <span>Сдвиги</span>
        </div>
        <div class="nav-item" onclick="switchTab('create', this)">
            <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
            <span>Написать</span>
        </div>
        <div class="nav-item" onclick="switchTab('profile', this)">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/></svg>
            <span>Профиль</span>
        </div>
    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script>
    let cases = [
        { id: "1", type: "CONFESSION", title: "Исповедь", text: "Я работаю баристой и тайно наливаю обычный кофе клиентам, которые просят декаф и при этом хамят мне." },
        { id: "2", type: "RED_FLAG", title: "Красный флаг", text: "На первом свидании парень попросил разделить счет пополам, хотя сам позвал меня в дорогой ресторан. Это ок?" },
        { id: "3", type: "HOT_TAKE", title: "Мнение", text: "Люди, которые отправляют голосовые сообщения длиннее 1 минуты, не уважают чужое время." }
    ];
    let currentIndex = 0;
    let stompClient = null;

    const labels = {
        "CONFESSION": { l: "ОСУДИТЬ", r: "ОПРАВДАТЬ" },
        "RED_FLAG": { l: "БЕГИ", r: "ЭТО НОРМА" },
        "HOT_TAKE": { l: "БРЕД", r: "БАЗА" }
    };

    // Мягкий синтезатор звуков для современного интерфейса
    let audioCtx = null;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    
    function triggerSound(type) {
        initAudio(); if(!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);

        if (type === 'soft') { // Мягкий тап
            osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'swipe') { // Сочный свайп
            osc.type = 'triangle'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }
    }

    function triggerHaptic(type = 'light') {
        if (navigator.vibrate) navigator.vibrate(type === 'heavy' ? 40 : 15);
    }

    function connect() {
        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;
        stompClient.connect({}, function () {
            document.getElementById('sys-status').style.boxShadow = "0 0 10px var(--accent-green)";
            stompClient.subscribe('/topic/live-results', (msg) => updateCharts(JSON.parse(msg.body)));
            stompClient.subscribe('/topic/new-cases', (msg) => {
                const c = JSON.parse(msg.body);
                const titles = {"CONFESSION": "Исповедь", "RED_FLAG": "Красный флаг", "HOT_TAKE": "Мнение"};
                c.title = titles[c.type]; cases.push(c);
                if(currentIndex >= cases.length - 1) renderCard();
            });
        });
    }

    function switchTab(tab, el) {
        triggerSound('soft'); triggerHaptic();
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelectorAll('.view-container').forEach(v => v.classList.remove('view-active'));
        el.classList.add('active');
        document.getElementById('view-' + tab).classList.add('view-active');
    }

    function renderCard() {
        const card = document.getElementById('current-card');
        document.getElementById('results-overlay').style.display = 'none';
        
        card.style.transform = 'translate(0px, 0px) rotate(0deg)';
        card.style.opacity = '1';
        document.getElementById('ind-left').style.opacity = 0;
        document.getElementById('ind-right').style.opacity = 0;

        if (currentIndex >= cases.length) {
            document.getElementById('card-banner').innerText = "Лента пуста";
            document.getElementById('card-text').innerHTML = "<span style='color:var(--text-secondary)'>Вы рассмотрели все прецеденты.<br>Создайте свой или зайдите позже.</span>";
            return;
        }

        const item = cases[currentIndex];
        document.getElementById('card-banner').innerText = item.title;
        document.getElementById('card-text').innerText = item.text;
        
        document.getElementById('ind-left').innerText = labels[item.type].l;
        document.getElementById('ind-right').innerText = labels[item.type].r;
    }

    // --- ФИЗИКА СВАЙПОВ ---
    const card = document.getElementById('current-card');
    let startX = 0, currentX = 0, distanceX = 0, isDragging = false;

    card.addEventListener('touchstart', (e) => {
        if(document.getElementById('results-overlay').style.display === 'flex') return;
        isDragging = true; card.classList.add('dragging');
        startX = e.touches[0].clientX; initAudio();
    });

    card.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        currentX = e.touches[0].clientX; distanceX = currentX - startX;
        let rotation = distanceX / 20;
        card.style.transform = `translate(${distanceX}px, ${Math.abs(distanceX)/10}px) rotate(${rotation}deg)`;
        
        if(distanceX > 40) {
            document.getElementById('ind-right').style.opacity = Math.min(distanceX / 120, 1);
            document.getElementById('ind-left').style.opacity = 0;
        } else if (distanceX < -40) {
            document.getElementById('ind-left').style.opacity = Math.min(Math.abs(distanceX) / 120, 1);
            document.getElementById('ind-right').style.opacity = 0;
        } else {
            document.getElementById('ind-left').style.opacity = 0;
            document.getElementById('ind-right').style.opacity = 0;
        }
    });

    card.addEventListener('touchend', () => {
        if (!isDragging) return;
        isDragging = false; card.classList.remove('dragging');
        const threshold = window.innerWidth * 0.35;
        
        if (distanceX > threshold) executeVote('right');
        else if (distanceX < -threshold) executeVote('left');
        else {
            card.style.transition = 'transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1)';
            card.style.transform = 'translate(0px, 0px) rotate(0deg)';
            document.getElementById('ind-left').style.opacity = 0;
            document.getElementById('ind-right').style.opacity = 0;
            setTimeout(() => card.style.transition = '', 300);
        }
        distanceX = 0;
    });

    function executeVote(dir) {
        triggerSound('swipe'); triggerHaptic('heavy');
        const item = cases[currentIndex];
        
        document.getElementById('lbl-res-left').innerText = labels[item.type].l;
        document.getElementById('lbl-res-right').innerText = labels[item.type].r;

        card.style.transition = 'transform 0.3s ease-out, opacity 0.3s';
        card.style.transform = `translate(${dir === 'right' ? 150 : -150}%, 50px) rotate(${dir === 'right' ? 30 : -30}deg)`;
        card.style.opacity = '0';

        if (stompClient) stompClient.send("/app/vote", {}, JSON.stringify({ caseId: item.id, direction: dir }));
        
        setTimeout(() => {
            card.style.transition = '';
            card.style.transform = 'translate(0px, 0px) rotate(0deg)';
            card.style.opacity = '1';
            document.getElementById('results-overlay').style.display = 'flex';
            // Запускаем анимацию баров с нуля для эффекта
            document.getElementById('bar-left').style.width = '0%';
            document.getElementById('bar-right').style.width = '0%';
        }, 300);
    }

    function updateCharts(res) {
        if (cases[currentIndex] && res.caseId === cases[currentIndex].id) {
            setTimeout(() => {
                document.getElementById('bar-left').style.width = res.leftPercent + '%';
                document.getElementById('lbl-left').innerText = res.leftPercent + '%';
                document.getElementById('bar-right').style.width = res.rightPercent + '%';
                document.getElementById('lbl-right').innerText = res.rightPercent + '%';
            }, 50); // Небольшая задержка для плавного старта анимации CSS
        }
    }

    function nextCase() { triggerSound('soft'); triggerHaptic(); currentIndex++; renderCard(); }

    function submitCase() {
        const type = document.getElementById('new-case-type').value;
        const text = document.getElementById('new-case-text').value;
        if(text.length < 5) { alert('Опишите ситуацию подробнее.'); return; }
        if (stompClient) {
            stompClient.send("/app/create", {}, JSON.stringify({ type: type, content: text }));
            document.getElementById('new-case-text').value = '';
            triggerSound('swipe');
            switchTab('arena', document.querySelector('.nav-item'));
        }
    }

    renderCard(); connect();
</script>
</body>
</html>
