<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>СДВИГ</title>
    
    <!-- КРИТИЧЕСКИ ВАЖНО: Этот скрипт позволяет приложению понять, что оно внутри Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body { background: #111; color: #fff; font-family: monospace; text-align: center; margin: 0; padding: 20px; }
        .hidden { display: none !important; }
        .btn { padding: 10px 20px; margin: 5px; background: #333; color: #fff; border: 1px solid #555; border-radius: 5px; cursor: pointer; }
        .btn:disabled { background: #222; color: #555; border-color: #333; cursor: not-allowed; }
        .spinner { border: 4px solid #333; border-top: 4px solid #00ff66; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #main-card { margin: 20px auto; padding: 20px; border: 1px solid #00ff66; border-radius: 10px; width: 90%; max-width: 400px; background: #222; transition: transform 0.2s; user-select: none; }
    </style>
</head>
<body>

    <!-- Экран загрузки -->
    <div id="splash-screen">
        <h1 style="letter-spacing: 5px;">СДВИГ</h1>
        <p id="splash-text" style="color: #00ff66;">Инициализация...</p>
        <div class="spinner"></div>
    </div>

    <!-- Экран логина (для браузера) -->
    <div id="login-screen" class="hidden">
        <h2>АВТОРИЗАЦИЯ</h2>
        <p style="color: #aaa; font-size: 14px;">Для доступа к системе требуется идентификация.</p>
        
        <div id="telegram-widget-container" style="margin: 20px 0;">
            <script async src="https://telegram.org/js/telegram-widget.js?22" 
                    data-telegram-login="sdvig_game_bot" 
                    data-size="large" 
                    data-onauth="onTelegramAuth(user)" 
                    data-request-access="write"></script>
        </div>

        <div style="margin-top: 20px;">
            <button class="btn" disabled>ВК (В планах)</button>
            <button class="btn" disabled>Google (В планах)</button>
        </div>
    </div>

    <!-- Главный экран -->
    <div id="main-screen" class="hidden">
        <div id="hud" style="font-size: 14px; margin-bottom: 20px; color: #aaa;">
            Энергия: <span id="hud-energy" style="color:#fff;"></span> | 
            Кредиты: <span id="hud-credits" style="color:#ffcc00;"></span> | 
            Ранг: <span id="hud-rank" style="color:#fff;"></span><br>
            XP: <span id="hud-xp" style="color:#00ff66;"></span>
        </div>

        <div id="main-card">
            <p id="case-description" style="font-size: 16px; line-height: 1.5;"></p>
            <p id="hint-text" style="font-weight: bold; margin-top: 20px; height: 20px;"></p>
        </div>

        <div id="result-overlay" class="hidden" style="margin-top: 20px; border: 1px solid #555; padding: 15px; background: #1a1a1a;">
            <p id="result-text" style="margin-top: 0;"></p>
            <div style="color: #aaa; font-size: 14px; margin-bottom: 15px;">
                Получено XP: <span id="rew-xp" style="color:#00ff66;"></span> | 
                Кредиты: <span id="rew-credits" style="color:#ffcc00;"></span> | 
                Потеря энергии: <span id="rew-energy" style="color:#ff3333;"></span>
            </div>
            <button class="btn" onclick="nextCase()">СЛЕДУЮЩЕЕ ДЕЛО</button>
        </div>

        <div id="controls" style="margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center;">
            <button class="btn" onclick="upgradeSkill(1)">Навык 1 (<span id="lvl-skill1"></span>)</button>
            <button class="btn" onclick="upgradeSkill(2)">Навык 2 (<span id="lvl-skill2"></span>)</button>
            <button class="btn" onclick="buyCoffee()">Кофе (40 Cr)</button>
            <button class="btn">Ассистент</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
