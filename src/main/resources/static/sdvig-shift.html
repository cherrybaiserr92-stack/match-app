<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>СДВИГ — прототип v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#05080d; --bg-1:#0c121b; --ink:#ece5d4; --dim:#8b94a4;
  --amber:#c8860a; --amber-lite:#ffcf6b; --amber-deep:#7a4e08;
  --line:rgba(255,255,255,.10); --cyan:#5cd0ff; --rose:#ff6f86;
  --win:#34d39a; --fail:#ff5160; --glass:rgba(17,23,34,.62);
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ height:100%; margin:0; }
body{
  font-family:'Inter',system-ui,sans-serif; color:var(--ink); overflow:hidden; user-select:none;
  background:radial-gradient(130% 90% at 50% -15%, #18243a 0%, #0c1320 42%, var(--bg-0) 100%);
}
/* атмосфера: туман + зерно */
.fog{ position:fixed; inset:-20%; z-index:0; pointer-events:none; opacity:.5;
  background:
    radial-gradient(40% 30% at 20% 30%, rgba(120,150,190,.12), transparent 60%),
    radial-gradient(50% 35% at 80% 70%, rgba(90,120,170,.10), transparent 60%),
    radial-gradient(45% 30% at 60% 20%, rgba(200,134,10,.06), transparent 60%);
  filter:blur(20px); animation:drift 26s ease-in-out infinite alternate; }
@keyframes drift{ from{ transform:translate(-3%,-2%) scale(1.05);} to{ transform:translate(3%,2%) scale(1.12);} }
body::after{ content:''; position:fixed; inset:0; z-index:1; pointer-events:none; opacity:.045; mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='90' height='90'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>"); }
.vignette{ position:fixed; inset:0; z-index:2; pointer-events:none;
  box-shadow:inset 0 0 160px 40px rgba(0,0,0,.65); }

.wrap{ position:relative; z-index:5; max-width:480px; margin:0 auto; height:100%;
  display:flex; flex-direction:column; padding:max(12px,env(safe-area-inset-top)) 14px 14px; }

/* ── верхняя панель ── */
.topbar{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:6px; }
.case-name{ font-family:'Unbounded',sans-serif; font-weight:800; font-size:12.5px; letter-spacing:.04em;
  color:var(--amber-lite); text-transform:uppercase; }
.case-sub{ font-size:9.5px; color:var(--dim); letter-spacing:.16em; text-transform:uppercase; margin-top:2px; }
.ev-chip{ display:flex; align-items:center; gap:7px; padding:8px 13px; border-radius:999px; cursor:pointer;
  background:var(--glass); border:1px solid var(--line); backdrop-filter:blur(8px); font-size:12px; font-weight:600; }
.ev-chip b{ color:var(--amber-lite); font-family:'Unbounded',sans-serif; }
.ev-dot{ width:7px; height:7px; border-radius:50%; background:var(--amber); box-shadow:0 0 10px var(--amber); }
/* индикатор прогресса дела */
.progress{ height:3px; border-radius:3px; background:rgba(255,255,255,.07); overflow:hidden; margin:8px 2px 4px; }
.progress > i{ display:block; height:100%; width:0; border-radius:3px;
  background:linear-gradient(90deg,var(--amber-deep),var(--amber-lite)); box-shadow:0 0 10px var(--amber);
  transition:width .5s cubic-bezier(.3,1,.4,1); }

/* ── СЦЕНА + КАРУСЕЛЬ ── */
.stage{ position:relative; flex:1; }

/* ── НАСТОЯЩЕЕ 3D-КОЛЬЦО (карусель), наклонено как тор ──
   Крутилки для подгонки: --ring-tilt, --ring-r, --card-w, --card-h */
:root{ --card-w:min(64%,228px); --card-h:min(58vh,492px); }
/* COVERFLOW-КАРУСЕЛЬ: ряд карт, центральная вынесена вперёд (чуть крупнее) */
.ring-scene{ position:absolute; inset:0; z-index:1; perspective:1150px; perspective-origin:50% 50%; }
.ring{ position:absolute; inset:0; transform-style:preserve-3d; }
/* рубашки по окружности — позиция задаётся inline transform (rotateY*72 + translateZ) */
.cfcard{ position:absolute; left:50%; top:50%; width:var(--card-w); height:var(--card-h);
  touch-action:none; will-change:transform,opacity; }
.cfinner{ position:absolute; inset:0; border-radius:22px; overflow:hidden; backface-visibility:hidden;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
  background:linear-gradient(160deg, #2c4365 0%, #141d2c 74%); border:1px solid rgba(255,207,107,.22);
  box-shadow:0 18px 38px rgba(0,0,0,.55), 0 0 22px rgba(200,134,10,.12), inset 0 1px 0 rgba(255,255,255,.10); }
.cfinner::after{ content:''; position:absolute; inset:0; box-shadow:inset 0 0 80px rgba(0,0,0,.5); pointer-events:none; }
.cfcard .bemb{ width:64px; height:64px; opacity:.3; position:relative; z-index:1;
  background:no-repeat center/contain url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ffcf6b' stroke-width='1.1'><circle cx='10.5' cy='10.5' r='6'/><path d='M15 15l5 5' stroke-width='1.7' stroke-linecap='round'/><path d='M10.5 7v7M7 10.5h7' opacity='.5'/></svg>"); }
.cfcard .blbl{ position:relative; z-index:1; font-family:'Unbounded',sans-serif; font-size:10px; font-weight:700;
  letter-spacing:.26em; color:rgba(255,207,107,.5); text-transform:uppercase; }
.cfcard.active{ z-index:20; cursor:grab; }
.cfcard.active .cfinner{ align-items:stretch; justify-content:flex-start; gap:0;
  background:#0d141f; border:1px solid rgba(255,255,255,.18);
  box-shadow:0 30px 60px rgba(0,0,0,.62), 0 0 30px rgba(200,134,10,.10), inset 0 1px 0 rgba(255,255,255,.12); }
.cfcard.active .cfinner::after{ display:none; }
.cfcard.active.grab{ cursor:grabbing; }

/* фон карты по типу */
.scene{ position:absolute; inset:0; z-index:0; opacity:.95; }
.scene .grad{ position:absolute; inset:0;
  background:radial-gradient(95% 55% at 50% 0%, rgba(200,134,10,.16), transparent 62%),
            linear-gradient(180deg, rgba(14,20,30,.15), rgba(5,8,13,.9)); }
.scene .art{ position:absolute; inset:0; opacity:.14; background:no-repeat center 30%/72%; }
.scene::after{ content:''; position:absolute; inset:0; box-shadow:inset 0 -110px 80px rgba(0,0,0,.55); }

.pad{ position:relative; z-index:3; padding:20px 19px 16px; display:flex; flex-direction:column; height:100%; }
.badge{ align-self:flex-start; font-family:'Unbounded',sans-serif; font-size:9.5px; font-weight:700; letter-spacing:.16em;
  text-transform:uppercase; padding:6px 12px; border-radius:8px; color:var(--amber-lite);
  background:rgba(200,134,10,.13); border:1px solid rgba(200,134,10,.4); }
.title{ font-family:'Unbounded',sans-serif; font-weight:900; font-size:23px; line-height:1.12; margin:13px 0 10px;
  text-shadow:0 2px 18px rgba(0,0,0,.5); }
.text{ font-size:14.5px; line-height:1.5; color:#ded6c4; }
.spacer{ flex:1; }
.clue{ margin-top:14px; padding:12px 14px; border-radius:12px; font-size:13px; color:var(--amber-lite);
  background:rgba(200,134,10,.08); border-left:3px solid var(--amber); }

/* подсказки выбора */
.choices{ display:flex; gap:10px; margin-top:14px; }
.choice{ flex:1; padding:12px 9px; border-radius:14px; font-size:13px; font-weight:600; text-align:center;
  border:1px solid var(--line); background:rgba(255,255,255,.035); color:#d6cebd; transition:border-color .15s,background .15s; }
.choice .dir{ display:block; font-size:10px; margin-bottom:4px; letter-spacing:.12em; }
.choice.l .dir{ color:var(--rose); } .choice.r .dir{ color:var(--cyan); }

/* штампы */
.stamp{ position:absolute; top:30px; z-index:6; font-family:'Unbounded',sans-serif; font-weight:900;
  font-size:23px; letter-spacing:.06em; padding:7px 15px; border-radius:11px; opacity:0; border:3px solid currentColor; }
.stamp.l{ right:26px; transform:rotate(11deg); color:var(--rose); } .stamp.r{ left:26px; transform:rotate(-11deg); color:var(--cyan); }

/* ─── СДВИГ: раскол реальности (усиленный) ─── */
.cfcard.shift .scene .grad{ background:
    radial-gradient(70% 50% at 22% 12%, rgba(92,208,255,.18), transparent 55%),
    radial-gradient(70% 50% at 78% 88%, rgba(255,111,134,.18), transparent 55%),
    linear-gradient(180deg, rgba(8,12,20,.4), rgba(4,7,12,.92)); }
.shift-intro{ font-size:13.5px; line-height:1.45; color:#cdd6e2; margin:6px 0 8px; }
.vstack{ display:flex; flex-direction:column; gap:8px; margin-top:8px; }
.vpanel{ position:relative; padding:10px 13px; border-radius:13px; border:1px solid; overflow:hidden;
  transition:transform .14s ease, opacity .14s ease, box-shadow .14s ease; }
.vpanel .vlabel{ font-family:'Unbounded',sans-serif; font-weight:800; font-size:16px; letter-spacing:.04em; margin-bottom:5px; }
.vpanel .vtext{ font-size:12.5px; line-height:1.38; opacity:.92; }
.vpanel.a{ color:var(--cyan); border-color:rgba(92,208,255,.38);
  background:linear-gradient(120deg, rgba(92,208,255,.13), rgba(92,208,255,.02)); }
.vpanel.b{ color:var(--rose); border-color:rgba(255,111,134,.38);
  background:linear-gradient(240deg, rgba(255,111,134,.13), rgba(255,111,134,.02)); }
.vpanel.dim{ opacity:.34; }
.vpanel.hot{ box-shadow:0 0 24px currentColor, inset 0 0 16px rgba(255,255,255,.06); transform:scale(1.025); }
/* мерцающий шов «сдвига» между версиями */
.seam{ height:2px; margin:0 14px; border-radius:2px;
  background:linear-gradient(90deg, transparent, var(--amber-lite), #fff, var(--amber-lite), transparent);
  box-shadow:0 0 12px var(--amber-lite); animation:seamflick 2s steps(2) infinite; }
@keyframes seamflick{ 0%,90%{ opacity:.85;} 93%{ opacity:.3;} 96%{ opacity:1;} 100%{ opacity:.6;} }

/* ─── СЖИГАНИЕ активной карты ─── */
.cfcard.burning{ pointer-events:none; z-index:25; }
/* огненный фронт (следует за линией сгорания) */
.fire{ position:absolute; top:-6%; bottom:-6%; width:50px; transform:translateX(-50%); pointer-events:none; z-index:9; mix-blend-mode:screen; will-change:left,opacity; }
.fire::before{ content:''; position:absolute; inset:0;
  background:linear-gradient(90deg, transparent, rgba(255,70,0,.35) 28%, rgba(255,150,40,.85) 45%, rgba(255,246,205,1) 50%, rgba(255,150,40,.85) 55%, rgba(255,70,0,.35) 72%, transparent);
  filter:blur(3px); box-shadow:0 0 26px 6px rgba(255,110,20,.7), 0 0 64px 16px rgba(255,60,0,.4);
  animation:fireFlick .11s steps(2) infinite; }
.fire::after{ content:''; position:absolute; left:50%; top:-3%; width:12px; height:106%; transform:translateX(-50%);
  background:linear-gradient(180deg, transparent, rgba(255,234,180,.85) 28%, #fff 50%, rgba(255,234,180,.85) 72%, transparent);
  filter:blur(1.5px); animation:fireFlick .09s steps(2) infinite; }
@keyframes fireFlick{ 0%{ opacity:.82; transform:translateX(-50%) scaleY(1);} 100%{ opacity:1; transform:translateX(-50%) scaleY(1.07);} }
/* искры */
.spark{ position:absolute; width:4px; height:4px; border-radius:50%; pointer-events:none; z-index:10;
  background:radial-gradient(circle, #fff, #ffd36b 40%, #ff7a18 72%, transparent);
  box-shadow:0 0 7px 2px rgba(255,150,40,.8); animation:sparkUp var(--sd,900ms) ease-out forwards; }
@keyframes sparkUp{ 0%{ transform:translate(0,0) scale(1); opacity:1;} 100%{ transform:translate(var(--sx,0),var(--sy,-60px)) scale(.3); opacity:0;} }
/* дым */
.smoke{ position:absolute; left:-6%; right:-6%; bottom:0; height:130%; z-index:7; pointer-events:none; opacity:0;
  background:radial-gradient(72% 58% at 50% 100%, rgba(22,18,15,.7), transparent 72%); filter:blur(7px);
  animation:smokeRise 2.2s ease-out forwards; }
@keyframes smokeRise{ 0%{ opacity:0; transform:translateY(12%) scale(1);} 25%{ opacity:.5;} 100%{ opacity:0; transform:translateY(-32%) scale(1.22);} }

/* лифт вверх (правый свайп) */
.cfcard.lifting{ animation:liftAway .34s ease-in forwards; pointer-events:none; }
@keyframes liftAway{ to{ transform:translate(-50%,-50%) translateY(-130%) rotateZ(-4deg) scale(.92); opacity:0; } }

/* ── доска улик ── */
.ev-panel{ position:fixed; left:0; right:0; bottom:0; z-index:30; max-width:480px; margin:0 auto;
  background:rgba(8,12,19,.97); backdrop-filter:blur(16px); border-top:1px solid var(--line);
  border-radius:22px 22px 0 0; padding:18px 18px max(18px,env(safe-area-inset-bottom));
  transform:translateY(112%); transition:transform .3s cubic-bezier(.3,1,.4,1); }
.ev-panel.open{ transform:translateY(0); }
.ev-panel h3{ font-family:'Unbounded',sans-serif; font-size:12.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--amber-lite); margin:0 0 12px; }
.ev-list{ display:flex; flex-direction:column; gap:8px; max-height:46vh; overflow:auto; }
.ev-item{ font-size:13px; line-height:1.45; color:#d8d0bf; padding:11px 13px; border-radius:11px;
  background:rgba(255,255,255,.04); border-left:3px solid var(--amber); }
.ev-empty{ font-size:13px; color:var(--dim); }
.ev-close{ display:block; width:100%; margin-top:14px; padding:13px; border:none; border-radius:12px;
  background:rgba(255,255,255,.06); color:var(--ink); font-weight:600; font-size:14px; cursor:pointer; }

/* ── концовка ── */
.ending{ position:fixed; inset:0; z-index:40; display:none; flex-direction:column; align-items:center; justify-content:center;
  padding:30px; text-align:center; background:radial-gradient(80% 60% at 50% 28%, rgba(18,26,40,.65), rgba(4,7,12,.97)); }
.ending.show{ display:flex; animation:fade .55s ease; }
@keyframes fade{ from{opacity:0} to{opacity:1} }
.seal{ width:112px; height:112px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-family:'Unbounded',sans-serif; font-weight:900; font-size:42px; margin-bottom:22px; border:3px solid;
  box-shadow:0 0 36px currentColor; animation:sealpop .5s cubic-bezier(.2,1.5,.4,1) both; }
@keyframes sealpop{ 0%{ transform:scale(.4); opacity:0;} 100%{ transform:scale(1); opacity:1;} }
.seal.win{ color:var(--win);} .seal.partial{ color:var(--amber-lite);} .seal.fail{ color:var(--fail);}
.e-verdict{ font-family:'Unbounded',sans-serif; font-weight:900; font-size:27px; letter-spacing:.03em; margin-bottom:8px; }
.e-verdict.win{ color:var(--win);} .e-verdict.partial{ color:var(--amber-lite);} .e-verdict.fail{ color:var(--fail);}
.e-text{ font-size:15px; line-height:1.6; color:#d8d0bf; max-width:360px; margin-bottom:18px; }
.e-meta{ font-size:12px; color:var(--dim); letter-spacing:.06em; margin-bottom:26px; } .e-meta b{ color:var(--amber-lite); }
.btn{ font-family:'Unbounded',sans-serif; font-weight:800; font-size:14px; letter-spacing:.04em; padding:16px 36px; border-radius:14px;
  border:none; cursor:pointer; background:linear-gradient(180deg,#ffdf95,var(--amber)); color:#241701;
  box-shadow:0 10px 26px rgba(200,134,10,.4); }
.proto-note{ position:fixed; bottom:8px; left:0; right:0; text-align:center; font-size:9.5px; z-index:3;
  color:rgba(139,148,164,.5); letter-spacing:.12em; }
@media (prefers-reduced-motion:reduce){ *{ animation-duration:.01ms!important; transition-duration:.01ms!important; } }
</style>
</head>
<body>
<div class="fog"></div>
<div class="vignette"></div>

<div class="wrap">
  <div class="topbar">
    <div>
      <div class="case-name" id="case-name">Дело №001</div>
      <div class="case-sub">Музейный квартал · 12+</div>
    </div>
    <div class="ev-chip" id="ev-chip"><span class="ev-dot"></span>Улики <b id="ev-count">0</b></div>
  </div>
  <div class="progress"><i id="prog"></i></div>
  <div class="stage" id="stage"><div class="ring-scene"><div class="ring" id="ring"></div></div></div>
</div>

<div class="ev-panel" id="ev-panel">
  <h3>Доска улик</h3>
  <div class="ev-list" id="ev-list"></div>
  <button class="ev-close" id="ev-close">Закрыть</button>
</div>

<div class="ending" id="ending">
  <div class="seal" id="e-seal"></div>
  <div class="e-verdict" id="e-verdict"></div>
  <div class="e-text" id="e-text"></div>
  <div class="e-meta" id="e-meta"></div>
  <button class="btn" id="e-restart">Заново</button>
</div>
<div class="proto-note">ПРОТОТИП «СДВИГ» · карусель-дело · свайп решает судьбу карты</div>

<script>
"use strict";

/* арт-мотивы по типу события (line-art SVG) */
const ART={
  crime:"<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 70' fill='none' stroke='%23ffcf6b' stroke-width='1'><rect x='30' y='20' width='40' height='34' rx='2'/><path d='M30 28h40M38 20v8M62 20v8'/><circle cx='50' cy='40' r='5'/></svg>",
  evidence:"<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 70' fill='none' stroke='%23ffcf6b' stroke-width='1'><circle cx='44' cy='32' r='13'/><path d='M54 42l14 14' stroke-width='1.6' stroke-linecap='round'/></svg>",
  witness:"<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 70' fill='none' stroke='%23ffcf6b' stroke-width='1'><rect x='34' y='14' width='32' height='44' rx='2'/><path d='M50 14v44M34 36h32'/></svg>",
  suspect:"<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 70' fill='none' stroke='%23ffcf6b' stroke-width='1'><circle cx='50' cy='28' r='10'/><path d='M32 58c2-12 34-12 36 0' stroke-linecap='round'/></svg>",
  shift:"<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 70' fill='none' stroke='%23ffcf6b' stroke-width='1'><path d='M50 8v54M40 22l-12 13 12 13M60 22l12 13-12 13' stroke-linecap='round'/></svg>",
  final:"<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 70' fill='none' stroke='%23ffcf6b' stroke-width='1'><path d='M40 26l20-8 8 20-20 8z'/><path d='M48 22l16 14M30 56h28' stroke-linecap='round'/></svg>"
};
function artBg(t){ return "url(\"data:image/svg+xml;utf8,"+(ART[t]||ART.evidence)+"\")"; }

/* ═══════════ ДЕЛО (формат — граф событий) ═══════════ */
const CASE={
  name:"Дело №001 · Звезда Севера",
  truth:{ time:"day", liar:"restorer", guard:"clean" },  // канон (скрыт)
  start:"e0", total:9,  // примерная длина пути для прогресса
  events:{
    e0:{ t:"crime", badge:"Преступление", title:"Кража в музее",
      text:"Утро. Из главного зала исчезла «Звезда Севера» — сапфир в платине. Витрина заперта, сигнализация всю ночь молчала. У пустого постамента ты впервые ловишь сдвиг: воздух дрожит, будто зал помнит две разные ночи.",
      left:{ label:"Осмотреть зал", to:"eHall" },
      right:{ label:"Опросить охрану", to:"eGuard" } },

    eHall:{ t:"evidence", badge:"Осмотр", title:"Главный зал",
      text:"Мрамор, пыль, холодный свет дежурных ламп. Две вещи просят внимания: сама витрина и постамент под ней.",
      left:{ label:"Витрина", evidence:"Витрина: замок заводской, стекло без царапин — её не вскрывали.", to:"eClue1" },
      right:{ label:"Постамент", evidence:"На постаменте — микрослед монтажного клея, как от установки копии.", to:"eClue1" } },

    eClue1:{ t:"evidence", badge:"Улика", title:"Тихий взлом",
      text:"Ни взлома, ни следов борьбы. Если витрину не трогали силой — экспонат вынес тот, у кого был ключ. Или его подменили заранее, ещё до «кражи».",
      left:{ label:"Журнал доступа", evidence:"Ключ-карта реставратора отмечалась днём, в часы профилактики зала.", to:"eGuard" },
      right:{ label:"Книга смен", evidence:"Ночная смена — один охранник, Седов. Днём в зал пускали бригаду.", to:"eGuard" } },

    eGuard:{ t:"witness", badge:"Свидетель", title:"Охранник Седов",
      text:"Седов мнёт фуражку, клянётся, что ночью никто не входил. Камеры «барахлили с обеда». Чем дольше говорит, тем чаще спотыкается на слове «днём».",
      left:{ label:"Надавить на часы", evidence:"Седов сознаётся: днём в зал пускали реставрационную бригаду без сопровождения.", to:"eCams" },
      right:{ label:"Поднять записи", evidence:"Записи обрываются не ночью, а в 15:40 — средь бела дня.", to:"eCams" } },

    eCams:{ t:"evidence", badge:"Архив камер", title:"Обрыв в 15:40",
      text:"Картинка с зала глохнет средь дня и оживает к закрытию. Кто-то знал график камер. Картина начинает двоиться — и сдвиг нарастает.",
      left:{ label:"К версиям дня", to:"eShift1" },
      right:{ label:"К версиям дня", to:"eShift1" } },

    eShift1:{ shift:true, t:"shift", badge:"СДВИГ · 1", title:"Две ночи",
      intro:"Зал раскалывается надвое. Тяни карту — одна реальность твердеет, ей и сбыться.",
      a:{ label:"◄ НОЧЬ", vtext:"Ночная кража: кто-то вошёл через служебный ход, пока сигнализация спала.", set:{time:"night"}, bad:true, to:"eAfter1" },
      b:{ label:"ДЕНЬ ►", vtext:"Подмена днём: экспонат заменили копией на профилактике, «кражу» разыграли к утру.", set:{time:"day"}, to:"eAfter1" } },

    eAfter1:{ t:"suspect", badge:"Озарение", title:"Двое у постамента",
      text:"@T@ Провернуть подмену могли двое: куратор Лацис — у него доступ ко всему крылу. И реставратор Корн — лишь он работал с экспонатом вплотную и знал крепления.",
      left:{ label:"Куратор Лацис", evidence:"Лацис холоден. Алиби — «весь день в архиве», но журнал архива в эти часы пуст.", to:"eRestorer" },
      right:{ label:"Реставратор Корн", evidence:"Корн потеет, твердит про «копию для выставки», которой нет ни в одной описи.", to:"eRestorer" } },

    eRestorer:{ t:"suspect", badge:"Допрос", title:"Кто ближе к делу",
      text:"Оба нервничают, оба что-то недоговаривают. Но ложь сейчас — только у одного из них. Сдвиг снова поднимается к горлу.",
      left:{ label:"Слушать Лациса", evidence:"Лацис кивает на Корна: «он один трогал крепления».", to:"eShift2" },
      right:{ label:"Слушать Корна", evidence:"Корн кивает на Лациса: «у него ключи от всего».", to:"eShift2" } },

    eShift2:{ shift:true, t:"shift", badge:"СДВИГ · 2", title:"Чья ложь",
      intro:"Снова раскол — один лжёт прямо сейчас. Выбери, чью ложь ты видишь.",
      a:{ label:"◄ ЛЖЁТ ЛАЦИС", vtext:"Лжёт куратор: доступ ко всему, мотив, пустое алиби. Удобно.", set:{liar:"curator"}, bad:true, to:"eGuardFate" },
      b:{ label:"ЛЖЁТ КОРН ►", vtext:"Лжёт реставратор: только он касался экспоната и знал крепления.", set:{liar:"restorer"}, to:"eGuardFate" } },

    eGuardFate:{ t:"witness", badge:"Свидетель", title:"Удобный виноватый",
      text:"Следствие давит: повесить всё на Седова. Дежурил, камеры «сам отключил» — готовый соучастник. На него ложится легко. Но что-то в этом не сходится.",
      left:{ label:"Проверить счета Седова", evidence:"Счета Седова чисты, ни лишней копейки. Его подставили под удар.", to:"eShift3" },
      right:{ label:"Поверить, что он чист", evidence:"Седов лишь проспал смену. Соучастия нет — есть подстава.", to:"eShift3" } },

    eShift3:{ shift:true, t:"shift", badge:"СДВИГ · 3", title:"Судьба Седова",
      intro:"Последний раскол. Охранник — звено схемы или козёл отпущения? Реши, кем он был.",
      a:{ label:"◄ СОУЧАСТНИК", vtext:"Седов в деле: отключил камеры за долю. Быстрое, красивое закрытие.", set:{guard:"paid"}, bad:true, to:"eAccuse" },
      b:{ label:"ПОДСТАВА ►", vtext:"Седова подставили: настоящий вор увёл след на охранника.", set:{guard:"clean"}, to:"eAccuse" } },

    eAccuse:{ t:"final", badge:"Финал", title:"Имя на постановлении",
      text:"Сдвиги улеглись. Пора назвать имя — обратной дороги нет. Кого ты обвиняешь в подмене «Звезды Севера»?",
      left:{ label:"Куратор Лацис", set:{accused:"curator"}, bad:true, to:"__resolve__" },
      right:{ label:"Реставратор Корн", set:{accused:"restorer"}, to:"__resolve__" } }
  }
};
/* подстановки текста по флагам */
function fill(text,f){
  let pre="";
  if(text.indexOf("@T@")>=0){
    pre = f.time==="day"
      ? "Следы клея, дневная ключ-карта, обрыв камер в 15:40 — версия дня обретает вес. "
      : "Но следов ночного входа всё меньше, будто эта правда не держится. ";
    text=text.replace("@T@","").trim();
  }
  return pre+text;
}

function computeEnding(f){
  const t=CASE.truth;
  const align=(f.time===t.time?1:0)+(f.liar===t.liar?1:0)+(f.guard===t.guard?1:0);
  if(f.accused==="restorer" && align===3)
    return { kind:"win", mark:"✓", verdict:"ДЕЛО РАСКРЫТО",
      text:"Корн сломался. Копию прятал в реставрационной, оригинал готовил к перепродаже, а Седова подставил для отвода глаз. Каждый твой сдвиг лёг точно в линию правды — безупречно.", align };
  if(f.accused==="restorer")
    return { kind:"partial", mark:"≈", verdict:"РАСКРЫТО НА ВОЛОСКЕ",
      text:"Ты назвал верного — Корна. Но часть твоих сдвигов вела в сторону, и в суде эти улики поедут. Победа, которой просто повезло.", align };
  return { kind:"fail", mark:"✗", verdict:"ЛОЖНЫЙ СЛЕД",
    text:"Лациса увели в наручниках. А через неделю «Звезду» нашли у перекупщика — с подписью Корна. Ты осудил невиновного: сдвиг обманул тебя.", align };
}

/* хаптика */
const TG=window.Telegram && window.Telegram.WebApp;
function haptic(kind){
  try{ if(TG && TG.HapticFeedback){
    if(kind==="shift") TG.HapticFeedback.notificationOccurred("warning");
    else if(kind==="burn") TG.HapticFeedback.impactOccurred("heavy");
    else TG.HapticFeedback.impactOccurred("medium"); return; } }catch(e){}
  try{ navigator.vibrate && navigator.vibrate(kind==="shift"?[14,40,14,40,30]:kind==="burn"?[10,30,60]:14); }catch(e){}
}

/* ═══════════ ДВИЖОК ═══════════ */
const State={ ev:CASE.start, flags:{}, evidence:[], step:0 };
const ring=document.getElementById("ring");
const stage=document.getElementById("stage");
const evCountEl=document.getElementById("ev-count");
const progEl=document.getElementById("prog");
let cards=[], centerIndex=3, busy=false, active=null, SPIN_DUR=560;
const N=7;
const SLOT={
 "-3":"translate(-50%,-50%) translateX(-300px) translateZ(-250px) rotateY(50deg) scale(.5)",
 "-2":"translate(-50%,-50%) translateX(-210px) translateZ(-150px) rotateY(46deg) scale(.64)",
 "-1":"translate(-50%,-50%) translateX(-140px) translateZ(-58px) rotateY(35deg) scale(.82)",
 "0":"translate(-50%,-50%) translateZ(0px) scale(1)",
 "1":"translate(-50%,-50%) translateX(140px) translateZ(-58px) rotateY(-35deg) scale(.82)",
 "2":"translate(-50%,-50%) translateX(210px) translateZ(-150px) rotateY(-46deg) scale(.64)",
 "3":"translate(-50%,-50%) translateX(300px) translateZ(-250px) rotateY(-50deg) scale(.5)"
};
function backHTML(){ return '<div class="bemb"></div><div class="blbl">Дело</div>'; }
function cardHTML(ev){
  const scene='<div class="scene"><div class="grad"></div><div class="art" style="background-image:'+artBg(ev.t)+'"></div></div>';
  if(ev.shift){
    return scene+'<div class="pad"><span class="badge">'+ev.badge+'</span><div class="title">'+ev.title+'</div>'
      +'<div class="shift-intro">'+ev.intro+'</div><div class="vstack">'
      +'<div class="vpanel a"><div class="vlabel">'+ev.a.label+'</div><div class="vtext">'+ev.a.vtext+'</div></div>'
      +'<div class="seam"></div>'
      +'<div class="vpanel b"><div class="vlabel">'+ev.b.label+'</div><div class="vtext">'+ev.b.vtext+'</div></div>'
      +'</div></div>';
  }
  return scene
    +'<span class="stamp l">'+(ev.left.label||"").replace(/^◄\s*/,"")+'</span>'
    +'<span class="stamp r">'+(ev.right.label||"").replace(/\s*►$/,"")+'</span>'
    +'<div class="pad"><span class="badge">'+ev.badge+'</span><div class="title">'+ev.title+'</div>'
    +'<div class="text">'+fill(ev.text,State.flags)+'</div><div class="spacer"></div><div class="choices">'
    +'<div class="choice l"><span class="dir">СВАЙП ВЛЕВО</span>'+ev.left.label+'</div>'
    +'<div class="choice r"><span class="dir">СВАЙП ВПРАВО</span>'+ev.right.label+'</div>'
    +'</div></div>';
}
function setBack(el){ el.classList.remove("active","shift","grab","burning"); el.onpointerdown=null; el._ev=null; el.innerHTML='<div class="cfinner">'+backHTML()+'</div>'; }
function setActive(el, ev){ el.classList.add("active"); el.classList.toggle("shift", !!ev.shift); el.innerHTML='<div class="cfinner">'+cardHTML(ev)+'</div>'; el._ev=ev; active=el; bindDrag(el, ev); }
function slotOf(e){ let x=e-centerIndex; while(x>3)x-=N; while(x<-3)x+=N; return x; }
function layout(animate){
  cards.forEach(function(el,e){ const x=slotOf(e);
    const jump=(el._slot!==undefined && Math.abs(x-el._slot)>1);
    el.style.transition=(animate&&!jump)?("transform "+SPIN_DUR+"ms cubic-bezier(.17,.78,.28,1), opacity .42s"):"none";
    el.style.transform=SLOT[String(x)];
    el.style.opacity=(Math.abs(x)>=3?"0":"1");
    el.style.zIndex=String(20-Math.abs(x));
    el._slot=x;
  });
}
function buildBacks(){
  for(let i=0;i<N;i++){ const el=document.createElement("div"); el.className="cfcard"; el._slot=undefined; ring.appendChild(el); cards.push(el); }
  cards.forEach(function(el,e){ if(e===centerIndex) setActive(el, CASE.events[CASE.start]); else setBack(el); });
  layout(false);
}
function burnCard(el, dir, done){
  haptic("burn"); el.onpointerdown=null; el.classList.add("burning");
  const inner=el.querySelector('.cfinner');
  const fire=document.createElement('div'); fire.className='fire'; el.appendChild(fire);
  const smoke=document.createElement('div'); smoke.className='smoke'; el.appendChild(smoke);
  const DUR=2200, fromLeft=(dir==='left'); let t0=0,last=0;
  function spark(fx){ const s=document.createElement('div'); s.className='spark';
    s.style.left=(fx*100)+'%'; s.style.top=(18+Math.random()*64)+'%';
    s.style.setProperty('--sx',((Math.random()*2-1)*34|0)+'px');
    s.style.setProperty('--sy',((-50-Math.random()*80)|0)+'px');
    s.style.setProperty('--sd',((700+Math.random()*600)|0)+'ms');
    el.appendChild(s); setTimeout(function(){ s.remove(); },1400); }
  function frame(ts){
    if(!t0){ t0=ts; last=ts; }
    const p=Math.min(1,(ts-t0)/DUR), ep=p*p;
    const fx=fromLeft?(1-ep):ep, soft=0.13;
    let g;
    if(fromLeft){ const a=Math.max(0,(fx-soft)*100), b=Math.min(100,fx*100);
      g='linear-gradient(90deg,#000 0,#000 '+a.toFixed(1)+'%,transparent '+b.toFixed(1)+'%,transparent 100%)'; }
    else { const a=Math.max(0,fx*100), b=Math.min(100,(fx+soft)*100);
      g='linear-gradient(90deg,transparent 0,transparent '+a.toFixed(1)+'%,#000 '+b.toFixed(1)+'%,#000 100%)'; }
    inner.style.webkitMaskImage=g; inner.style.maskImage=g;
    fire.style.left=(fx*100)+'%';
    fire.style.opacity=(p<0.05?p/0.05:(p>0.9?Math.max(0,(1-p)/0.1):1)).toFixed(2);
    const drift=(fromLeft?-1:1)*ep*44;
    el.style.transform='translate(-50%,-50%) translateX('+drift.toFixed(1)+'px) rotate('+((fromLeft?-1:1)*ep*2.4).toFixed(2)+'deg) scale('+(1-ep*0.03).toFixed(3)+')';
    if(ts-last>48){ last=ts; spark(fx); }
    if(p<1) requestAnimationFrame(frame); else { done&&done(); }
  }
  requestAnimationFrame(frame);
}
function advance(dir, ev, opt){
  if(busy) return; busy=true;
  applyOption(opt);
  const c0=cards[centerIndex]; c0.onpointerdown=null;
  function rotate(immediateBack){
    if(immediateBack) setBack(c0);
    centerIndex=(centerIndex+(dir==="left"?1:-1)+N)%N;
    State.step++; setProgress();
    var resolve=(opt.to==="__resolve__");
    if(!resolve) setActive(cards[centerIndex], CASE.events[opt.to]);
    layout(true);
    setTimeout(function(){
      if(resolve) showEnding(computeEnding(State.flags));
      else if(c0!==cards[centerIndex]) setBack(c0);
      SPIN_DUR=560; busy=false;
    }, resolve?440:Math.max(470,SPIN_DUR+20));
  }
  if(opt.bad) burnCard(c0, dir, function(){ rotate(true); });
  else { haptic(ev.shift?"shift":"tap"); rotate(false); }
}
function addEvidence(t){ if(t && State.evidence.indexOf(t)<0) State.evidence.push(t); evCountEl.textContent=State.evidence.length; }
function setProgress(){ const p=Math.min(100,Math.round(State.step/CASE.total*100)); progEl.style.width=p+"%"; }

function go(id){ if(id==="__resolve__"){ showEnding(computeEnding(State.flags)); } }

/* контент карты рисует cardHTML(); активной карту делает setActive() в карусели */

function applyOption(o){ if(o.set) Object.assign(State.flags,o.set); if(o.evidence) addEvidence(o.evidence); }

/* свайп + сжигание/лифт */
function bindDrag(card, ev){
  let sx=0,sy=0,dx=0,dy=0,drag=false,pid=null,vx=0,lastX=0,lastT=0; const TH=96;
  const pA=card.querySelector(".vpanel.a"), pB=card.querySelector(".vpanel.b");
  const stL=card.querySelector(".stamp.l"), stR=card.querySelector(".stamp.r");
  function setShiftGap(k){ // k:-1..1  (◄ влево = версия A, ► вправо = версия B)
    if(!pA||!pB) return;
    pA.classList.toggle("hot", k<-0.2); pA.classList.toggle("dim", k>0.2);
    pB.classList.toggle("hot", k>0.2);  pB.classList.toggle("dim", k<-0.2);
  }
  function down(x,y,id){ drag=true; pid=id; sx=x; sy=y; vx=0; lastT=0; lastX=x; card.classList.add("grab"); }
  function move(x,y){ if(!drag) return; const now=performance.now();
    if(lastT){ const d=now-lastT; if(d>0) vx=vx*0.6+0.4*((x-lastX)/d*1000); }
    lastX=x; lastT=now; dx=x-sx; dy=y-sy;
    card.style.transform=`translate(-50%,-50%) translate(${dx}px,${dy*0.22}px) rotate(${dx/24}deg)`;
    const k=Math.max(-1,Math.min(1,dx/TH));
    if(ev.shift) setShiftGap(k);
    else { if(stL) stL.style.opacity=Math.max(0,-k); if(stR) stR.style.opacity=Math.max(0,k); }
  }
  function up(){ if(!drag) return; drag=false; card.classList.remove("grab");
    if(Math.abs(dx)>TH){ commit(dx>0?"right":"left"); }
    else{ card.style.transition="transform .26s cubic-bezier(.3,1.3,.5,1)";
      card.style.transform="translate(-50%,-50%)";
      if(ev.shift) setShiftGap(0); if(stL) stL.style.opacity=0; if(stR) stR.style.opacity=0;
      setTimeout(()=>card.style.transition="",260); } }
  function commit(side){
    const opt = ev.shift ? (side==="left"?ev.a:ev.b) : (side==="left"?ev.left:ev.right);
    const sp=Math.min(1, Math.abs(vx)/2400); SPIN_DUR=Math.round(600 - sp*230);
    advance(side, ev, opt);
  }
  card.addEventListener("pointerdown", e=>{ down(e.clientX,e.clientY,e.pointerId);
    window.addEventListener("pointermove",pm); window.addEventListener("pointerup",pu); window.addEventListener("pointercancel",pu); });
  function pm(e){ if(pid!=null&&e.pointerId!==pid) return; move(e.clientX,e.clientY); }
  function pu(e){ if(pid!=null&&e.pointerId!==pid) return; up();
    window.removeEventListener("pointermove",pm); window.removeEventListener("pointerup",pu); window.removeEventListener("pointercancel",pu); }
}

/* концовка */
function showEnding(r){
  const e=document.getElementById("ending");
  const seal=document.getElementById("e-seal"); seal.className="seal "+r.kind; seal.textContent=r.mark;
  const ver=document.getElementById("e-verdict"); ver.className="e-verdict "+r.kind; ver.textContent=r.verdict;
  document.getElementById("e-text").textContent=r.text;
  document.getElementById("e-meta").innerHTML=`Сходимость сдвигов: <b>${r.align} / 3</b> · улик собрано: <b>${State.evidence.length}</b>`;
  progEl.style.width="100%"; haptic(r.kind==="fail"?"shift":"burn"); e.classList.add("show");
}
document.getElementById("e-restart").onclick=()=>{
  State.ev=CASE.start; State.flags={}; State.evidence=[]; State.step=0; evCountEl.textContent="0"; setProgress();
  document.getElementById("ending").classList.remove("show");
  if(active) active.remove();
  render(CASE.events[CASE.start], true);
};

/* доска улик */
const evPanel=document.getElementById("ev-panel");
document.getElementById("ev-chip").onclick=()=>{
  const list=document.getElementById("ev-list");
  list.innerHTML = State.evidence.length ? State.evidence.map(t=>`<div class="ev-item">${t}</div>`).join("")
    : `<div class="ev-empty">Пока пусто. Улики появятся по ходу расследования.</div>`;
  evPanel.classList.add("open");
};
document.getElementById("ev-close").onclick=()=>evPanel.classList.remove("open");

/* старт */
document.getElementById("case-name").textContent=CASE.name;
if(TG){ try{ TG.ready(); TG.expand(); }catch(e){} }
buildBacks(); setProgress();
</script>
</body>
